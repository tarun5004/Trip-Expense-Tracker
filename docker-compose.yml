version: '3.8'

x-health-check: &postgres-health-check
  test: ["CMD-SHELL", "pg_isready -U postgres"]
  interval: 10s
  timeout: 5s
  retries: 5

x-health-check-redis: &redis-health-check
  test: ["CMD", "redis-cli", "ping"]
  interval: 10s
  timeout: 5s
  retries: 5

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: splitsmart-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-splitsmart_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck: *postgres-health-check
    networks:
      - splitsmart-net

  # Cache & Websocket Broker
  redis:
    image: redis:7-alpine
    container_name: splitsmart-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck: *redis-health-check
    networks:
      - splitsmart-net

  # Core Backend API
  app:
    build: 
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: splitsmart-server
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-password123}@postgres:5432/${DB_NAME:-splitsmart_dev}
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=super_secret_dev_key_do_not_use_in_prod
      - JWT_REFRESH_SECRET=another_super_secret_refresh_key
      - CORS_ORIGIN=http://localhost:5173
    ports:
      - "5000:5000"
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - splitsmart-net
    command: npm run dev

  # Frontend Application
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: splitsmart-client
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
      - VITE_SOCKET_URL=http://localhost:5000
    ports:
      - "5173:5173"
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - splitsmart-net
    command: npm run dev

  # Database Inspection Utility
  pgadmin:
    image: dpage/pgadmin4
    container_name: splitsmart-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@splitsmart.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - splitsmart-net

volumes:
  pgdata:
  redisdata:

networks:
  splitsmart-net:
    driver: bridge
